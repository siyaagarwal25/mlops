name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: diabetes-prediction-model
  PYTHON_VERSION: "3.12"

jobs:
  # Job 1: Code Quality Check
  lint:
    runs-on: ubuntu-latest
    name: Lint & Code Quality
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        flake8 main.py train.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 main.py train.py --count --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check code formatting with black
      run: black --check main.py train.py

  # Job 2: Unit Tests
  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: lint
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Train model (if needed)
      run: python train.py
    
    - name: Run tests with coverage gate
      run: pytest -v --tb=short
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

  # Job 3: Build Docker Image
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build image (no push for PR/develop)
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: diabetes-prediction-model:ci-${{ github.sha }}
        labels: |
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
      if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/diabetes-prediction-model:latest
          ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/diabetes-prediction-model:${{ github.sha }}
        labels: |
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''

  # Job 4: Security Scan
  security:
    runs-on: ubuntu-latest
    name: Security Scan
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Bandit security check
      run: |
        bandit -r main.py train.py -ll -f json -o bandit-report.json
        bandit -r main.py train.py -ll
    
    - name: Upload Bandit report
      uses: actions/upload-artifact@v3
      with:
        name: bandit-report
        path: bandit-report.json
      if: always()

  # Job 5: Notify Deployment Readiness
  notify:
    runs-on: ubuntu-latest
    name: Deployment Readiness
    needs: [lint, test, build, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Deployment Ready
      run: |
        echo "✅ All checks passed! Image ready for deployment."
        echo "Version: ${{ github.sha }}"
        echo "Branch: ${{ github.ref }}"
